<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shorts Guard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/popup.css">
</head>
<body>
  <div class="popup-container">
    <!-- Onboarding View -->
    <div id="onboarding-view" class="view hidden">
      <div class="logo">
        <span class="logo-emoji">🛡️</span>
        <h1>Shorts Guard</h1>
      </div>
      <p class="tagline">Take control of your Shorts consumption</p>

      <div class="onboarding-question">
        <label for="limit-input">How many YouTube Shorts do you want to watch today?</label>
        <div class="input-wrapper">
          <input type="number" id="limit-input" min="1" max="100" value="10">
        </div>
      </div>

      <button id="confirm-limit" class="btn-primary">Start Protecting</button>
    </div>

    <!-- Main View -->
    <div id="main-view" class="view hidden">
      <div class="header">
        <span class="logo-emoji">🛡️</span>
        <h1>Shorts Guard</h1>
      </div>

      <div class="stats">
        <div class="count-display">
          <span id="current-count" class="count-number">0</span>
          <span class="count-separator">/</span>
          <span id="limit-display" class="count-limit">10</span>
          <span class="count-label">shorts today</span>
        </div>

        <div class="progress-container">
          <div id="progress-bar" class="progress-bar"></div>
        </div>

        <div id="reset-time" class="reset-time"></div>
      </div>

      <div class="actions">
        <button id="change-limit-btn" class="btn-secondary">Change Limit</button>
        <button id="reset-btn" class="btn-danger">Reset Today</button>
      </div>
    </div>

    <!-- Change Limit Modal -->
    <div id="change-limit-modal" class="modal hidden">
      <div class="modal-content">
        <h2>Set Daily Limit</h2>
        <div class="input-wrapper">
          <input type="number" id="new-limit-input" min="1" max="100" value="10">
        </div>
        <div class="modal-actions">
          <button id="cancel-limit" class="btn-secondary">Cancel</button>
          <button id="save-limit" class="btn-primary">Save</button>
        </div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
